<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&icon_names=autorenew,delete,edit,home" />
    <title>To-Do List App</title>

</head>

<body>
    <br>
    <div class="container">
        <h1>To-Do List</h1>
        <div class="input-area">
            <label class="field">
                <input type="text" id="taskInput" placeholder="Enter a new task..." />
            </label>
            <button id="addBtn"><span class="material-symbols-outlined"
                    style="font-size: 48px;">autorenew</span></button>
        </div>
        <ul id="taskList"></ul>
    </div>
    </div>
    <footer class="credits">Made with ♥ — Demo mini app</footer>
    <script src="script.js"></script>
</body>

</html>
