<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&icon_names=autorenew,delete,edit,home" />

    <title>To-Do List App</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");

        :root {
            --bg1: #6a11cb;
            --bg2: #2575fc;
            --card: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.06);
            --muted: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            display: flex;
            flex-direction: column;

            align-items: center;
            justify-content: space-between;
            font-family: "Roboto", sans-serif;
            font-weight: 700 bold;
            /* Se for uma fonte variável, você pode ajustar o eixo de largura também */
            font-variation-settings: "wdth" 100;
            /* Color tokens and theme variables */
            --bg1: #6a11cb;
            --bg2: #2575fc;
            --card: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.06);
            --muted: rgba(255, 255, 255, 0.7);
            margin: 0;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            width: 100vw;
            height: 100vh;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 60%;
            min-height: 30%;
            padding: 2%;

            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.04),
                    rgba(255, 255, 255, 0.02));
            border-radius: 14px;
            /* overflow: hidden; */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .input-area {
            display: flex;
            margin-bottom: 20px;
        }

        #addBtn {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #0ed42f;
            color: white;
            border: none;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            transition: background 0.3s;
        }

        #addBtn:hover {
            background-color: #2980b9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            padding: 12px;
            /* background: #f9f9f9; */
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.2s;
            background: #0084ff;
            color: #000;
            font-size: 18px;
            margin-left: auto;
        }

        li.completed {
            background: #113361a2;
            text-decoration: line-through;
            color: #777;
            opacity: 0.9;
        }

        .field {
            display: flex;
            align-items: center;
            background: var(--glass);
            width: 100%;
            padding: 10px;
            border-radius: 10px;
        }

        .field .icon {
            margin-right: 10px;
            opacity: 0.95;
        }

        .field input {
            flex: 1;
            height: 80%;
            background: transparent;
            border: 0;
            outline: 0;
            color: #fff;
            font-size: 15px;
        }

        .field input:focus {
            border: 1px solid #3498db;
            border-radius: 10px;
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
        }

        button {
            padding: 8px 14px;
            margin-left: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .edit-btn {
            background: #f39c12;
            color: white;
        }

        .edit-btn:hover {
            background: #e67e22;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
        }

        .remove-btn:hover {
            background: #c0392b;
        }

        .credits {
            width: 100%;
            text-align: center;
            margin: 18px auto 0 auto;
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            /* restore subtle background to footer so it reads on the page */
            background: linear-gradient(90deg,
                    rgba(130, 8, 216, 0.772),
                    rgba(193, 61, 237, 0.357));
            padding: 10px 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
        }

        @media (max-width: 880px) {
            .container {
                width: 80%;
                flex-direction: column;
            }
        }

        /* Responsive: stack card vertically on narrower screens */
        @media (max-width: 420px) {
            .container {
                width: 90%;
                flex-direction: column;
            }

            .field input {
                font-size: 14px;
            }

        }
    </style>
</head>

<body>
    <br>
    <div class="container">
        <h1>To-Do List</h1>
        <div class="input-area">
            <label class="field">
                <input type="text" id="taskInput" placeholder="Enter a new task..." />
            </label>
            <button id="addBtn"><span class="material-symbols-outlined"
                    style="font-size: 48px;">autorenew</span></button>
        </div>
        <ul id="taskList"></ul>
    </div>
    </div>
    <footer class="credits">Made with ♥ — Demo mini app</footer>
    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Add new task
        addBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text === '') return;

            const li = document.createElement('li');
            li.innerHTML = `
        <input type="checkbox" class="complete-checkbox">
        <span class="task-text">${text}</span>
        <button class="edit-btn"><span class="material-symbols-outlined">edit</span></button>
        <button class="remove-btn"><span class="material-symbols-outlined">delete</span></button>
      `;
            taskList.appendChild(li);
            taskInput.value = '';
        });

        // Event delegation on the task list container
        taskList.addEventListener('click', (e) => {
            const target = e.target;

            // Handle Remove button
            if (target.classList.contains('remove-btn')) {
                target.parentElement.remove();
                return;
            }

            // Handle Edit button
            if (target.classList.contains('edit-btn')) {
                const li = target.parentElement;
                const taskText = li.querySelector('.task-text');
                const currentText = taskText.textContent;

                // Use prompt as a simple dialog for editing (as per assignment note)
                const newText = prompt('Edit your task:', currentText);
                if (newText !== null && newText.trim() !== '') {
                    taskText.textContent = newText.trim();
                }
                return;
            }
        });

        // Separate delegation for checkbox changes (change event)
        taskList.addEventListener('change', (e) => {
            if (e.target.classList.contains('complete-checkbox')) {
                const li = e.target.parentElement;
                if (e.target.checked) {
                    li.classList.add('completed');
                } else {
                    li.classList.remove('completed');
                }
            }
        });
    </script>
</body>

</html>
